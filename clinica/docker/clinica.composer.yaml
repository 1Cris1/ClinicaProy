version: '3.8'

services:
	sqlserver:
		image: mcr.microsoft.com/mssql/server:2019-latest
		container_name: clinica_sqlserver
		ports:
			- "1434:1433"
		environment:
			- ACCEPT_EULA=Y
			- SA_PASSWORD=Clinica2026*
			- MSSQL_PID=Developer
		volumes:
			- sqlserver-data:/var/opt/mssql
		healthcheck:
			test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Clinica2026*\" -Q \"SELECT 1\" || exit 1"]
			interval: 10s
			timeout: 5s
			retries: 10
		# Create the database after SQL Server starts
		command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 20 && /opt/mssql-tools/bin/sqlcmd -S localhost -U SA -P \"Clinica2026*\" -Q \"IF DB_ID(N'bd_clinica') IS NULL CREATE DATABASE [bd_clinica];\" && wait"

volumes:
	sqlserver-data:
		driver: local

# Nota: el usuario SA ya está definido como 'sa' y la contraseña es la misma que en el archivo original.