<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Médico - ClinicX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/medico.css}">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="app-sidebar doc-sidebar" id="sidebar">
        <div class="app-sidebar-brand">
            <div class="brand-icon">C</div>
            <div>
                <div class="brand-text">ClinicX</div>
                <div class="brand-sub" style="font-size: .6rem; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Portal Médico</div>
            </div>
        </div>

        <div class="app-sidebar-user">
            <div class="avatar" th:text="${(medicoGlobal ?: medico) != null ? #strings.substring((medicoGlobal ?: medico).nombres, 0, 1) + #strings.substring((medicoGlobal ?: medico).apellidos, 0, 1) : 'DR'}">DR</div>
            <div>
                <p class="user-name" th:text="${(medicoGlobal ?: medico) != null ? 'Dr. ' + (medicoGlobal ?: medico).nombres + ' ' + (medicoGlobal ?: medico).apellidos : 'Doctor'}">Dr. Médico</p>
                <p class="user-role" th:text="${(medicoGlobal ?: medico)?.especialidad?.nombre != null ? (medicoGlobal ?: medico).especialidad.nombre : 'Médico'}">Especialidad</p>
            </div>
        </div>

        <div class="app-sidebar-nav">
            <div class="app-sidebar-label">Principal</div>
            <a th:href="@{/medico/inicio}" th:class="${#strings.contains(view, 'dashboard')} ? 'app-nav-link active' : 'app-nav-link'" data-page="inicio">
                <i class="bi bi-grid-1x2-fill"></i> Panel
            </a>
            <a th:href="@{/medico/agenda}" th:class="${#strings.contains(view, 'agenda')} ? 'app-nav-link active' : 'app-nav-link'" data-page="agenda">
                <i class="bi bi-calendar3"></i> Mi Agenda
                <span class="badge rounded-pill bg-primary ms-auto" style="font-size: .65rem;" th:if="${citasHoyCount != null and citasHoyCount > 0}" th:text="${citasHoyCount}">5</span>
            </a>

            <div class="app-sidebar-label mt-2">Clínica</div>
            <a th:href="@{/medico/consulta}" th:class="${#strings.contains(view, 'consulta')} ? 'app-nav-link active' : 'app-nav-link'" data-page="consulta">
                <i class="bi bi-clipboard2-pulse-fill"></i> Consulta Activa
            </a>
            <a th:href="@{/medico/pacientes}" th:class="${#strings.contains(view, 'pacientes')} ? 'app-nav-link active' : 'app-nav-link'" data-page="pacientes">
                <i class="bi bi-people-fill"></i> Mis Pacientes
            </a>
            <a th:href="@{/medico/laboratorio}" th:class="${#strings.contains(view, 'laboratorio')} ? 'app-nav-link active' : 'app-nav-link'" data-page="laboratorio">
                <i class="bi bi-clipboard2-pulse"></i> Laboratorio
            </a>
            <a th:href="@{/medico/recetas}" th:class="${#strings.contains(view, 'recetas')} ? 'app-nav-link active' : 'app-nav-link'" data-page="recetas">
                <i class="bi bi-prescription2"></i> Recetas
            </a>

            <div class="app-sidebar-label mt-2">Cuenta</div>
            <a th:href="@{/medico/perfil}" th:class="${#strings.contains(view, 'perfil')} ? 'app-nav-link active' : 'app-nav-link'" data-page="perfil">
                <i class="bi bi-person-badge-fill"></i> Mi Perfil
            </a>
            <a th:href="@{/medico/configuracion}" th:class="${#strings.contains(view, 'configuracion')} ? 'app-nav-link active' : 'app-nav-link'" data-page="configuracion">
                <i class="bi bi-gear-fill"></i> Configuración
            </a>
        </div>

        <div class="app-sidebar-footer">
            <a th:href="@{/logout}" class="app-nav-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Cerrar sesión
            </a>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title mb-0 fw-bold" style="font-size: 1.1rem; color: var(--text);" th:text="${pageTitle}">Panel</h1>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="btn-icon bg-white border rounded-3 p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; color: var(--text-muted); cursor: pointer;" id="notifBtn" title="Notificaciones">
                    <i class="bi bi-bell"></i>
                </div>
                <div class="btn-icon bg-white border rounded-3 p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; color: var(--text-muted); cursor: pointer;" id="msgBtn" title="Mensajes">
                    <i class="bi bi-envelope"></i>
                </div>
                
                <div class="d-flex align-items-center gap-2 ms-2 d-none d-md-flex p-1 px-2 rounded-pill bg-white border">
                    <div style="width:32px;height:32px;background:var(--gradient-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.7rem;"
                         th:text="${(medicoGlobal ?: medico) != null ? #strings.substring((medicoGlobal ?: medico).nombres, 0, 1) + #strings.substring((medicoGlobal ?: medico).apellidos, 0, 1) : 'DR'}">DR</div>
                    <div class="pe-1">
                        <p class="mb-0 fw-bold" style="font-size:.75rem;line-height:1.2;"
                           th:text="${(medicoGlobal ?: medico) != null ? 'Dr. ' + (medicoGlobal ?: medico).apellidos : 'Doctor'}">Dr.</p>
                        <p class="mb-0" style="font-size:.65rem;color:var(--text-muted);"
                           th:text="${(medicoGlobal ?: medico)?.especialidad?.nombre != null ? (medicoGlobal ?: medico).especialidad.nombre : 'Médico'}">Especialidad</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="app-content">
            <div th:replace="~{ ${view} :: cuerpo }"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/vue.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <th:block th:if="${view != null}">
        <div th:replace="~{ ${view} :: scripts } ?: ~{}"></div>
    </th:block>
</body>
</html>
