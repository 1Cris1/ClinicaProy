<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><title>Pacientes - ClinicX Admin</title></head>
<body>
    <div th:fragment="cuerpo">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1">Gestión de Pacientes</h4>
                <p class="text-muted small mb-0"><span th:text="${totalPacientes}">0</span> pacientes registrados en el sistema.</p>
            </div>
        </div>

        <div th:if="${param.editado != null}" class="alert alert-success py-2 small fw-bold mb-3 rounded-3 border-0">
            <i class="bi bi-check-circle-fill me-1"></i> Paciente actualizado correctamente.
        </div>
        <div th:if="${param.eliminado != null}" class="alert alert-warning py-2 small fw-bold mb-3 rounded-3 border-0">
            <i class="bi bi-check-circle-fill me-1"></i> Paciente eliminado correctamente.
        </div>

        <div class="ad-card">
            <div class="ad-card-body p-0">
                <table class="ad-table" th:if="${usuarios != null and !usuarios.isEmpty()}">
                    <thead>
                        <tr><th>Usuario (DNI)</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <!-- ID rem -->
                            <td th:text="${u.username}">Username</td>
                            <td class="text-muted" th:text="${u.email != null ? u.email : '-'}">-</td>
                            <td>
                                <span class="ad-badge-status" th:text="${u.rol}" style="background:#DBEAFE;color:#2563EB;">ROLE</span>
                            </td>
                            <td>
                                <span class="ad-badge-status" style="background:#D1FAE5;color:#059669;">Activo</span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary border-0" data-bs-toggle="modal" th:data-bs-target="'#modalEditar'+${u.id}">
                                    <i class="bi bi-pencil-square"></i>
                                </button>
                                <a class="btn btn-sm btn-outline-danger border-0" th:href="@{/admin/pacientes/eliminar(id=${u.id})}" onclick="return confirm('Â¿Eliminar este paciente?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${usuarios == null or usuarios.isEmpty()}" class="text-center py-5">
                    <i class="bi bi-people" style="font-size:3rem;color:#6B7280;"></i>
                    <p class="text-muted mt-3">No hay pacientes registrados</p>
                </div>
            </div>
        </div>

        <!-- Modales de Editar para cada usuario -->
        <div th:each="u : ${usuarios}" class="modal fade" th:id="'modalEditar'+${u.id}" tabindex="-1">
            <div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius:.875rem;border:none;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" th:text="'Editar Paciente: ' + ${u.username}">Editar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/admin/pacientes/editar}" method="post">
                        <input type="hidden" name="id_usuario" th:value="${u.id}">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Usuario (DNI)</label>
                                <input name="username" class="form-control" th:value="${u.username}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Email</label>
                                <input name="email" type="email" class="form-control" th:value="${u.email}">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Nueva Contraseña (dejar en blanco para mantener)</label>
                                <input name="nueva_password" type="password" class="form-control" placeholder="Nueva contraseña">
                            </div>
                        </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-outline-secondary rounded-pill px-3 btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn rounded-pill px-4 fw-bold btn-sm" style="background:#2563EB;color:#fff;">Guardar Cambios</button>
                </div>
                    </form>
            </div></div>
        </div>
    </div>
</body>
</html>
