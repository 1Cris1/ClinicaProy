<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Médico - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:fragment="cuerpo">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h4 class="fw-bold mb-1">Registrar Nuevo Doctor</h4>
                <p class="text-muted small mb-0">Completa los datos del médico para agregarlo al sistema. Podrá acceder con su DNI como usuario.</p>
            </div>
            <div>
                <a th:href="@{/admin/medicos}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
            </div>
        </div>

        <div class="ad-card">
            <div class="ad-card-body">
                <form th:action="@{/admin/medicos/nuevo}" method="post" class="row g-3">
                    <!-- INFORMACIí“N PERSONAL -->
                    <div class="col-12">
                        <h6 class="fw-bold text-muted mb-3" style="border-bottom: 2px solid #E5E7EB; padding-bottom: 10px;">
                            <i class="bi bi-person-badge me-2" style="color: #2563EB;"></i> Datos Personales
                        </h6>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Nombres <span style="color: #DC2626;">*</span></label>
                        <input name="nombres" class="form-control" placeholder="Ej: Carlos" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Apellidos <span style="color: #DC2626;">*</span></label>
                        <input name="apellidos" class="form-control" placeholder="Ej: García López" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">DNI <span style="color: #DC2626;">*</span></label>
                        <input name="dni" type="text" class="form-control" placeholder="Ej: 45678912" required pattern="[0-9]{7,8}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Teléfono</label>
                        <input name="telefono" type="tel" class="form-control" placeholder="Ej: 998123456">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Email</label>
                        <input name="email" type="email" class="form-control" placeholder="Ej: dr.garcia@clinicx.pe">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">CMP (Colegio Médico)</label>
                        <input name="cmp" class="form-control" placeholder="Ej: 45678">
                    </div>

                    <!-- CREDENCIALES DE ACCESO -->
                    <div class="col-12 mt-4">
                        <h6 class="fw-bold text-muted mb-3" style="border-bottom: 2px solid #E5E7EB; padding-bottom: 10px;">
                            <i class="bi bi-lock me-2" style="color: #2563EB;"></i> Credenciales de Acceso
                        </h6>
                    </div>
                    <div class="col-md-12">
                        <div class="alert alert-info py-2 small border-0 rounded-3">
                            <i class="bi bi-info-circle me-2"></i> El doctor iniciará sesión con <strong>DNI</strong> como usuario y <strong>contraseña</strong> que configure aquí.
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Contraseña <span style="color: #DC2626;">*</span></label>
                        <input name="password" type="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>

                    <!-- ASIGNACIí“N PROFESIONAL -->
                    <div class="col-12 mt-4">
                        <h6 class="fw-bold text-muted mb-3" style="border-bottom: 2px solid #E5E7EB; padding-bottom: 10px;">
                            <i class="bi bi-hospital me-2" style="color: #2563EB;"></i> Asignación Profesional
                        </h6>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Especialidad</label>
                        <select name="especialidadId" class="form-select">
                            <option value="">-- Seleccionar Especialidad --</option>
                            <option th:each="e : ${especialidades}" th:value="${e.id}" th:text="${e.nombre}">Cardiología</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Sede</label>
                        <select name="sedeId" class="form-select">
                            <option value="">-- Seleccionar Sede --</option>
                            <option th:each="s : ${sedes}" th:value="${s.id}" th:text="${s.nombre}">Sede Principal</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-bold">Consultorio</label>
                        <input name="consultorio" type="text" class="form-control" placeholder="Ej: 201">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-primary">Horario Lunes-Viernes</label>
                        <input name="horarioLv" class="form-control" placeholder="Ej: 08:00 - 13:00">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-primary">Horario Sábado</label>
                        <input name="horarioSabado" class="form-control" placeholder="Ej: 08:00 - 12:00">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-primary">Duración Cita (min)</label>
                        <input name="duracionCita" type="number" class="form-control" value="30">
                    </div>

                    <!-- BOTONES -->
                    <div class="col-12 text-end mt-4 pt-3" style="border-top: 1px solid #E5E7EB;">
                        <a th:href="@{/admin/medicos}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold ms-2">
                            <i class="bi bi-plus-lg me-1"></i> Crear Doctor
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
