<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="cuerpo">
    <div class="row mb-4 align-items-center">
        <div class="col">
            <h4 class="fw-bold mb-0">Catálogo Maestro SUSALUD (Marzo 2026)</h4>
            <p class="text-muted small mb-0">Consulta la base de datos oficial de productos farmacéuticos.</p>
        </div>
        <div class="col-auto">
            <div class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2">
                <i class="bi bi-database-check me-1"></i> 569,077 registros cargados
            </div>
        </div>
    </div>

    <div class="doc-card shadow-sm border-0 mb-4">
        <div class="doc-card-body p-4">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label small fw-bold text-muted">Buscar por Código de Barras / GTIN (VCODPROD_FAR_003)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                        <input type="text" id="susalud-query" class="form-control bg-light border-0" 
                               placeholder="Ej: 7751859000828, 7750936003288..."
                               onkeyup="if(event.key==='Enter') buscarSusalud()">
                        <button onclick="buscarSusalud()" id="btn-buscar-susalud" class="btn btn-primary px-4">
                            <i class="bi bi-search me-1"></i> Buscar
                        </button>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted">Filtrar por Ubigeo (Opcional)</label>
                    <input type="text" id="susalud-ubigeo" class="form-control bg-light border-0" placeholder="Ej: 140130">
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor de Resultados -->
    <div id="results-container" class="d-none">
        <div class="doc-card shadow-sm border-0 mb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-muted small">
                        <tr>
                            <th>Código</th>
                            <th>Monto S/</th>
                            <th>Copago S/</th>
                            <th>Fecha Recep.</th>
                            <th>Ubigeo</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="susalud-table-body">
                        <!-- Filas dinámicas -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Mensaje No Resultados -->
    <div id="no-results" class="text-center py-5 d-none">
        <i class="bi bi-info-circle text-muted" style="font-size: 3rem;"></i>
        <h5 class="mt-3 text-muted">No se encontraron resultados</h5>
        <p class="small text-muted">Verifica que el código sea correcto.</p>
    </div>

    <!-- Modal Detalle -->
    <div class="modal fade" id="modalSusaludDetalle" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Detalle del Registro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body pt-3" id="modal-content-body">
                    <!-- Contenido dinámico del modal -->
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="scripts">
    <script>
        function buscarSusalud() {
            const query = document.getElementById('susalud-query').value;
            const btn = document.getElementById('btn-buscar-susalud');
            const container = document.getElementById('results-container');
            const noResults = document.getElementById('no-results');
            const tbody = document.getElementById('susalud-table-body');

            if (!query) return;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> Buscando...';
            
            fetch('/api/v1/external/farmacia/search?q=' + encodeURIComponent(query))
                .then(r => r.json())
                .then(data => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-search me-1"></i> Buscar';
                    
                    tbody.innerHTML = '';
                    if (data && data.length > 0) {
                        data.forEach(item => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td>
                                    <div class="fw-bold text-primary">${item.vcodprodFar003}</div>
                                    <div class="text-muted" style="font-size: .7rem;">Ref: ${item.vcodipressFac.substring(0,15)}...</div>
                                </td>
                                <td class="fw-bold">S/ ${(item.vmontprodfarFar || 0).toFixed(2)}</td>
                                <td>S/ ${(item.vcopagoprodfarFar || 0).toFixed(2)}</td>
                                <td><span class="small">${formatFechaSusalud(item.dfecrecepPq)}</span></td>
                                <td><span class="badge bg-light text-dark">${item.ubigeo}</span></td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick='verDetalleSusalud(${JSON.stringify(item)})'>
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </td>
                            `;
                            tbody.appendChild(tr);
                        });
                        container.classList.remove('d-none');
                        noResults.classList.add('d-none');
                    } else {
                        container.classList.add('d-none');
                        noResults.classList.remove('d-none');
                    }
                })
                .catch(err => {
                    console.error(err);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-search me-1"></i> Buscar';
                    alert('Error al consultar la base de datos.');
                });
        }

        function formatFechaSusalud(fecha) {
            if (!fecha) return '-';
            return new Date(fecha).toLocaleDateString('es-PE', {
                day: '2-digit', month: 'short', year: 'numeric'
            });
        }

        function verDetalleSusalud(item) {
            const body = document.getElementById('modal-content-body');
            body.innerHTML = `
                <div class="p-3 bg-light rounded-3 mb-3">
                    <div class="row g-2 small">
                        <div class="col-6"><span class="text-muted">IAFAS FAC:</span><br><strong class="text-break">${item.vcodiafasFac}</strong></div>
                        <div class="col-6"><span class="text-muted">IPRESS FAC:</span><br><strong class="text-break">${item.vcodipressFac}</strong></div>
                        <hr class="my-2">
                        <div class="col-6"><span class="text-muted">Doc. Pago:</span><br><strong>${item.vtdocpagoFac} - ${item.vndocpagoFac}</strong></div>
                        <div class="col-6"><span class="text-muted">Diagnóstico Asoc:</span><br><span class="badge bg-info">${item.vdiagasocprodfarFar || 'N/A'}</span></div>
                    </div>
                </div>
                <div class="alert alert-info py-2 small mb-0">
                    <i class="bi bi-info-circle me-1"></i> Datos TEDEF de SUSALUD actualizados a 2026.
                </div>
            `;
            const modal = new bootstrap.Modal(document.getElementById('modalSusaludDetalle'));
            modal.show();
        }
    </script>
</div>
</body>
</html>
