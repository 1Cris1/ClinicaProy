<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><title>Centro de Control - ClinicX Admin</title></head>
<body>
    <div th:fragment="cuerpo">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <div>
                <h4 class="fw-bold mb-0">Control de accesos y asignación de roles</h4>
            </div>
        </div>

        <!-- Alertas -->
        <div th:if="${param.rolCambiado}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" role="alert">
            <i class="bi bi-person-check-fill me-2"></i> Rol de usuario actualizado correctamente.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="app-card border-0 shadow-sm overflow-hidden">
            <div class="app-table-responsive">
                <table class="app-table align-middle">
                    <thead>
                        <tr>
                            <!-- th ID rem -->
                            <th>Usuario (DNI)</th>
                            <th>Email</th>
                            <th>Rol Actual</th>
                            <th>Estado</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <!-- td ID rem -->
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="rounded-circle bg-light d-flex align-items-center justify-content-center" style="width: 32px; height: 32px;">
                                        <i class="bi bi-person text-primary"></i>
                                    </div>
                                    <span class="fw-bold" th:text="${u.username}">admin</span>
                                </div>
                            </td>
                            <td th:text="${u.email}">admin@clinicx.com</td>
                            <td>
                                <span th:if="${u.idRol == 1}" class="badge bg-danger-subtle text-danger border border-danger-subtle px-3 py-2">ADMINISTRADOR</span>
                                <span th:if="${u.idRol == 2}" class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2">MÉDICO</span>
                                <span th:if="${u.idRol == 3}" class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2">PACIENTE</span>
                                <span th:if="${u.idRol == 4}" class="badge bg-warning-subtle text-warning border border-warning-subtle px-3 py-2">RECEPCIONISTA</span>
                            </td>
                            <td>
                                <span th:if="${u.estado == 1}" class="badge bg-success text-white px-3 py-2">ACTIVO</span>
                                <span th:if="${u.estado == 0}" class="badge bg-secondary text-white px-3 py-2">SUSPENDIDO</span>
                            </td>
                            <td class="text-end">
                                <div class="d-flex justify-content-end gap-2">
                                    <form th:action="@{/admin/usuarios/cambiar-rol}" method="post" class="d-inline-block">
                                        <input type="hidden" name="id" th:value="${u.id}">
                                        <div class="input-group input-group-sm">
                                            <select name="idRol" class="form-select" style="font-size: .75rem; width: 130px;">
                                                <option value="1" th:selected="${u.idRol == 1}">Administrador</option>
                                                <option value="2" th:selected="${u.idRol == 2}">Médico</option>
                                                <option value="3" th:selected="${u.idRol == 3}">Paciente</option>
                                                <option value="4" th:selected="${u.idRol == 4}">Recepcionista</option>
                                            </select>
                                            <button class="btn btn-primary" type="submit" title="Cambiar Rol">
                                                <i class="bi bi-save"></i>
                                            </button>
                                        </div>
                                    </form>
                                    
                                    <form th:action="@{/admin/usuarios/toggle-estado}" method="post" class="d-inline-block">
                                        <input type="hidden" name="id" th:value="${u.id}">
                                        <input type="hidden" name="estado" th:value="${u.estado == 1 ? 0 : 1}">
                                        <button type="submit" class="btn btn-sm text-white" th:classappend="${u.estado == 1 ? 'btn-danger' : 'btn-success'}" th:title="${u.estado == 1 ? 'Suspender Cuenta' : 'Activar Cuenta'}">
                                            <i class="bi" th:classappend="${u.estado == 1 ? 'bi-lock-fill' : 'bi-unlock-fill'}"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
