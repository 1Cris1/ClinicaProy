<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Calificar Atención - ClinicX</title>
</head>

<body>

<div th:fragment="cuerpo">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h4 class="fw-bold mb-1">
                <i class="bi bi-star-fill text-warning me-2"></i>
                Calificar Atención
            </h4>

            <p class="text-muted small mb-0">
                Comparte tu experiencia sobre las consultas médicas que has recibido.
            </p>
        </div>
    </div>


    <!-- Lista -->
    <div class="app-card border-0 shadow-sm">
        <div class="app-card-body p-4 p-md-5">

            <div class="cx-timeline">

                <!-- Citas -->
                <div th:each="cita : ${citas}"
                     class="cx-timeline-item mb-4 pb-4 border-bottom last-border-0">

                    <div class="row align-items-center g-3">

                        <!-- Fecha -->
                        <div class="col-auto">

                            <div class="rounded-pill d-flex flex-column align-items-center justify-content-center text-center"
                                 style="width:70px;height:70px;background:var(--bg-light);">

                                <div class="fw-bold text-primary"
                                     th:text="${#temporals.format(cita.fechaCita,'dd')}">
                                    08
                                </div>

                                <div class="text-uppercase fw-bold opacity-50"
                                     style="font-size:.65rem;"
                                     th:text="${#temporals.format(cita.fechaCita,'MMM')}">
                                    JUL
                                </div>

                            </div>

                        </div>


                        <!-- Información -->
                        <div class="col">

                            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-2">

                                <div>

                                    <h6 class="fw-bold mb-1 fs-5"
                                        th:text="${'Consulta: ' + cita.medico.especialidad.nombre}">
                                        Especialidad
                                    </h6>

                                    <p class="text-primary fw-medium mb-0"
                                       th:text="${'Dr. ' + cita.medico.nombres + ' ' + cita.medico.apellidos}">
                                        Médico
                                    </p>

                                </div>

                                <span class="app-badge"
                                      style="background:#DCFCE7;color:#15803D;">
                                    Atención completada
                                </span>

                            </div>


                            <p class="text-muted small mb-3">

                                <i class="bi bi-geo-alt me-1"></i>

                                <span
                                        th:text="${'Sede ' + cita.medico.sede.nombre + ' - Consultorio ' + cita.medico.consultorio}">
                                </span>

                            </p>


                            <!-- SIN CALIFICAR -->
                            <div th:if="${cita.feedback == null}">

                                <form th:action="@{/paciente/calificaciones}" method="post">

                                    <div class="mb-3">

                                        <label class="fw-semibold mb-2 d-block">

                                            Calificación

                                        </label>
                                        <input type="hidden"
                                            name="idCita"
                                            th:value="${cita.idCita}">

                                        <select
                                            class="form-select"
                                            name="puntuacion">

                                            <option value="">Seleccione...</option>
                                            <option value="5">⭐⭐⭐⭐⭐ Excelente</option>
                                            <option value="4">⭐⭐⭐⭐ Muy buena</option>
                                            <option value="3">⭐⭐⭐ Buena</option>
                                            <option value="2">⭐⭐ Regular</option>
                                            <option value="1">⭐ Mala</option>

                                        </select>

                                    </div>


                                    <div class="mb-3">

                                        <label class="fw-semibold mb-2">

                                            Comentario

                                        </label>

                                        <textarea
                                                class="form-control"
                                                rows="4"
                                                name="comentario"
                                                placeholder="Cuéntanos cómo fue tu experiencia...">
                                        </textarea>

                                    </div>


                                    <button
                                            class="app-btn bg-warning text-dark border-0">

                                        <i class="bi bi-star-fill me-2"></i>

                                        Guardar Calificación

                                    </button>

                                </form>

                            </div>


                            <!-- YA CALIFICÓ -->
                            <div th:if="${cita.feedback != null}">

                                <div class="mb-2">

                                    <span class="badge bg-success">

                                        <i class="bi bi-check-circle me-1"></i>

                                        Ya calificaste esta atención

                                    </span>

                                </div>

                                <div class="fs-4 text-warning mb-3">

                                    <span th:switch="${cita.feedback.puntuacion}">

                                        <span th:case="1">⭐</span>

                                        <span th:case="2">⭐⭐</span>

                                        <span th:case="3">⭐⭐⭐</span>

                                        <span th:case="4">⭐⭐⭐⭐</span>

                                        <span th:case="5">⭐⭐⭐⭐⭐</span>

                                    </span>

                                </div>

                                <div class="bg-light rounded-4 p-3">

                                    <p class="mb-0"
                                       th:text="${cita.feedback.comentario}">
                                    </p>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>


                <!-- Sin citas -->
                <div
                        th:if="${citas == null or #lists.isEmpty(citas)}"
                        class="text-center py-5">

                    <div class="opacity-10 mb-4"
                         style="font-size:5rem;">

                        <i class="bi bi-star"></i>

                    </div>

                    <h5 class="fw-bold">

                        No tienes atenciones para calificar

                    </h5>

                    <p class="text-muted">

                        Cuando finalices una consulta médica podrás calificarla aquí.

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
