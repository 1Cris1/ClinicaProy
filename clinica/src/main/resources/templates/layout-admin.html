<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ClinicX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="app-sidebar ad-sidebar" id="sidebar">
        <div class="app-sidebar-brand">
            <div class="brand-icon">C</div>
            <div>
                <div class="brand-text">ClinicX</div>
                <div class="brand-sub" style="font-size: .6rem; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Panel Administrador</div>
            </div>
        </div>

        <div class="app-sidebar-user">
            <div class="avatar">AD</div>
            <div>
                <p class="user-name">Admin Principal</p>
                <p class="user-role">Superadministrador</p>
            </div>
        </div>

        <div class="app-sidebar-nav">
            <div class="app-sidebar-label">Principal</div>
            <a th:href="@{/admin}" th:class="${#strings.contains(view, 'dashboard')} ? 'app-nav-link active' : 'app-nav-link'" data-page="dashboard">
                <i class="bi bi-grid-1x2-fill"></i> Panel
            </a>

            <a th:href="@{/admin/usuarios}" th:class="${#strings.contains(view, 'usuarios')} ? 'app-nav-link active' : 'app-nav-link'">
                <i class="bi bi-people-fill"></i> Usuarios
            </a>
            <a th:href="@{/admin/pacientes}" th:class="${#strings.contains(view, 'pacientes')} ? 'app-nav-link active' : 'app-nav-link'" data-page="pacientes">
                <i class="bi bi-person-heart-fill"></i> Pacientes
            </a>
            <a th:href="@{/admin/medicos}" th:class="${#strings.contains(view, 'medicos')} ? 'app-nav-link active' : 'app-nav-link'" data-page="medicos">
                <i class="bi bi-person-badge-fill"></i> Médicos
            </a>
            <a th:href="@{/admin/recepcionistas}" th:class="${#strings.contains(view, 'recepcionistas')} ? 'app-nav-link active' : 'app-nav-link'" data-page="recepcionistas">
                <i class="bi bi-person-lines-fill"></i> Recepcionistas
            </a>
            <a th:href="@{/admin/citas}" th:class="${#strings.contains(view, 'citas')} ? 'app-nav-link active' : 'app-nav-link'" data-page="citas">
                <i class="bi bi-calendar-event-fill"></i> Citas
            </a>

            <div class="app-sidebar-label mt-2">Clínica</div>
            <a th:href="@{/admin/especialidades}" th:class="${#strings.contains(view, 'especialidades')} ? 'app-nav-link active' : 'app-nav-link'" data-page="especialidades">
                <i class="bi bi-award-fill"></i> Especialidades
            </a>
            <a th:href="@{/admin/servicios}" th:class="${#strings.contains(view, 'servicios')} ? 'app-nav-link active' : 'app-nav-link'" data-page="servicios">
                <i class="bi bi-clipboard2-pulse-fill"></i> Servicios
            </a>
            <a th:href="@{/admin/productos}" th:class="${#strings.contains(view, 'productos')} ? 'app-nav-link active' : 'app-nav-link'">
                <i class="bi bi-capsule-pill"></i> Farmacia
            </a>
            <a th:href="@{/admin/susalud}" th:class="${#strings.contains(view, 'susalud')} ? 'app-nav-link active' : 'app-nav-link'">
                <i class="bi bi-shield-check-fill"></i> Catálogo SUSALUD
            </a>
            <a th:href="@{/admin/sedes}" th:class="${#strings.contains(view, 'sedes')} ? 'app-nav-link active' : 'app-nav-link'" data-page="sedes">
                <i class="bi bi-building-fill"></i> Sedes
            </a>
            <a th:href="@{/admin/promociones}" th:class="${#strings.contains(view, 'promociones')} ? 'app-nav-link active' : 'app-nav-link'" data-page="promociones">
                <i class="bi bi-megaphone-fill"></i> Promociones
            </a>

            <div class="app-sidebar-label mt-2">Sistema</div>
            <a th:href="@{/admin/reportes}" th:class="${#strings.contains(view, 'reportes')} ? 'app-nav-link active' : 'app-nav-link'" data-page="reportes">
                <i class="bi bi-graph-up-arrow"></i> Reportes
            </a>
            <a th:href="@{/admin/configuracion}" th:class="${#strings.contains(view, 'configuracion')} ? 'app-nav-link active' : 'app-nav-link'" data-page="configuracion">
                <i class="bi bi-gear-fill"></i> Configuración
            </a>
        </div>

        <div class="app-sidebar-footer">
            <a th:href="@{/}" class="app-nav-link text-danger">
                <i class="bi bi-box-arrow-left"></i> Salir al Portal
            </a>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-topbar">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title mb-0 fw-bold" style="font-size: 1.1rem; color: var(--text);" th:text="${pageTitle}">Panel</h1>
            </div>
            <div class="d-flex align-items-center gap-2">
                <div class="btn-icon bg-white border rounded-3 p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; color: var(--text-muted); cursor: pointer;" id="notifBtn" title="Notificaciones">
                    <i class="bi bi-bell"></i>
                </div>
                <div class="btn-icon bg-white border rounded-3 p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px; color: var(--text-muted); cursor: pointer;" id="msgBtn" title="Mensajes">
                    <i class="bi bi-envelope"></i>
                </div>
                <div class="d-flex align-items-center gap-2 ms-2 d-none d-md-flex p-1 px-2 rounded-pill bg-white border">
                    <div style="width:32px;height:32px;background:var(--gradient-primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.7rem;">AD</div>
                    <div class="pe-1">
                        <p class="mb-0 fw-bold" style="font-size:.75rem;line-height:1.2;">Admin</p>
                        <p class="mb-0" style="font-size:.65rem;color:var(--text-muted);">Mantenimiento</p>
                    </div>
                </div>
            </div>
        </header>
        <div class="app-content">
            <div th:replace="~{ ${view} :: cuerpo }"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/vue.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <th:block th:if="${view != null}">
        <div th:replace="~{ ${view} :: scripts } ?: ~{}"></div>
    </th:block>
</body>
</html>
