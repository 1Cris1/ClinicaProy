<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><title>Mi Agenda - ClinicX</title></head>
<body>
    <div th:fragment="cuerpo">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h4 class="fw-bold mb-0">Mi Agenda de Hoy</h4>
            <div class="d-flex gap-2 align-items-center">
                <span class="fw-bold small" th:text="${fechaFormateada}">-</span>
            </div>
        </div>

        <!-- Citas List -->
        <div class="doc-card">
            <div class="doc-card-body p-0">
                <table class="doc-table">
                    <thead>
                        <tr>
                            <th style="width:100px;">Hora</th>
                            <th>Paciente</th>
                            <th>Motivo</th>
                            <th>Estado</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${citasSemana}">
                            <td class="fw-bold text-muted" th:text="${c.horaCita}">-</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div style="width:30px;height:30px;background:linear-gradient(135deg,#0D9488,#2DD4BF);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                        <span style="font-size:.65rem;font-weight:700;color:#fff;"
                                              th:text="${#strings.substring(c.paciente.nombres,0,1) + #strings.substring(c.paciente.apellidos,0,1)}">P</span>
                                    </div>
                                    <span class="small fw-bold" th:text="${c.paciente.nombres + ' ' + c.paciente.apellidos}">Paciente</span>
                                </div>
                            </td>
                            <td class="text-muted small" th:text="${c.motivo}">-</td>
                            <td>
                                <span class="doc-badge-status"
                                      th:text="${c.estado}"
                                      th:style="${c.estado == 'Completada'} ? 'background:#D1FAE5;color:#059669;' : (${c.estado == 'Pendiente'} ? 'background:#CCFBF1;color:#0F766E;' : 'background:#FEF3C7;color:#D97706;')"></span>
                            </td>
                            <td>
                                <a th:if="${c.estado != 'Completada'}" th:href="@{/medico/consulta}"
                                   class="btn btn-sm rounded-pill px-3 fw-bold" style="background:var(--doc-primary);color:#fff;font-size:.7rem;">
                                    Atender
                                </a>
                                <span class="text-muted small" th:if="${c.estado == 'Completada'}"><i class="bi bi-check-circle-fill text-success"></i></span>
                            </td>
                        </tr>
                        <tr th:if="${citasSemana.isEmpty()}">
                            <td colspan="5" class="text-center py-5">
                                <i class="bi bi-calendar-x text-muted" style="font-size:2rem;"></i>
                                <p class="text-muted mt-2">No tienes citas programadas para el día de hoy.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
