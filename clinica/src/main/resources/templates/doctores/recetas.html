<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><title>Historial de Recetas - Médico</title></head>
<body>
<div th:fragment="cuerpo">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-1">Historial de Recetas</h4>
            <p class="text-muted small mb-0">Listado de todas las recetas médicas emitidas desde tu gestión.</p>
        </div>
    </div>

    <div class="doc-card shadow-sm border-0" th:if="${!historialRecetas.isEmpty()}">
        <div class="doc-card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" style="font-size: .95rem;">
                    <thead class="bg-light text-muted small fw-bold">
                        <tr>
                            <th class="ps-4 py-3">Cí“DIGO</th>
                            <th class="py-3">FECHA EMISIí“N</th>
                            <th class="py-3">PACIENTE</th>
                            <th class="py-3">ESTADO</th>
                            <th class="py-3">MEDICAMENTOS</th>
                            <th class="py-3 pe-4 text-center">OPCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${historialRecetas}">
                            <td class="ps-4">
                                <span class="badge bg-secondary-subtle text-secondary fw-bold" th:text="${r.codigo}">REC-001</span>
                            </td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <i class="bi bi-calendar-event me-2 text-muted"></i>
                                    <span th:text="${r.fechaEmision.format(T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy'))}">01/01/2026</span>
                                </div>
                            </td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="avatar-circle-sm" style="background: linear-gradient(135deg, #eee, #ddd); color: #555; font-weight: 700; font-size: .7rem;"
                                         th:text="${#strings.substring(r.paciente.nombres,0,1) + #strings.substring(r.paciente.apellidos,0,1)}">P</div>
                                    <span class="fw-bold" th:text="${r.paciente.nombres + ' ' + r.paciente.apellidos}">Paciente</span>
                                </div>
                            </td>
                            <td>
                                <span class="badge rounded-pill" 
                                      th:text="${r.estado}"
                                      th:classappend="${r.estado == 'Activa' ? 'bg-success-subtle text-success' : 'bg-light text-muted'}">Estado</span>
                            </td>
                            <td>
                                <span class="small text-muted" th:text="${r.medicamentos.size() + ' ítem(s)'}">0 items</span>
                            </td>
                            <td class="pe-4 text-center">
                                <a th:href="@{'/paciente/recetas/descargar/' + ${r.idReceta}}" target="_blank"
                                   class="btn btn-sm btn-outline-primary rounded-pill px-3 shadow-none">
                                    <i class="bi bi-download me-1"></i>PDF
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Estado Vacío -->
    <div th:if="${historialRecetas.isEmpty()}" class="doc-card text-center py-5 shadow-sm border-0">
        <div class="py-4">
            <i class="bi bi-prescription2 text-muted opacity-25" style="font-size: 4rem;"></i>
            <h5 class="mt-3 fw-bold text-muted">No has emitido recetas an</h5>
            <p class="text-muted">Las recetas generadas durante las consultas aparecerán aquí.</p>
        </div>
    </div>

    

</div>
</body>
</html>
