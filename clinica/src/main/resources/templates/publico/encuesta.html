<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción - ClinicX</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .survey-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 550px;
            margin: 60px auto;
            padding: 40px;
            border: 1px solid #e2e8f0;
        }
        .clinic-logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: #3b82f6;
            letter-spacing: -0.5px;
        }
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            font-size: 2.5rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #fbbf24;
            transform: scale(1.15);
        }
        .btn-submit {
            background: #3b82f6;
            color: white;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            width: 100%;
        }
        .btn-submit:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .patient-info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="survey-card text-center">
        <div class="clinic-logo mb-3">
            <i class="bi bi-activity me-2"></i>ClinicX
        </div>
        <h4 class="fw-bold mb-1">Tu opinión nos importa</h4>
        <p class="text-muted small">Ayúdanos a mejorar nuestro servicio de atención médica.</p>

        <div class="patient-info text-start my-4">
            <p class="mb-1 small text-muted text-uppercase fw-bold">Detalle de la consulta:</p>
            <p class="mb-1 text-dark"><strong>Médico:</strong> <span th:text="${cita.medico.nombres + ' ' + cita.medico.apellidos}">Dr. Especialista</span></p>
            <p class="mb-0 text-dark"><strong>Especialidad:</strong> <span th:text="${cita.medico.especialidad.nombre}">Medicina General</span></p>
        </div>

        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

        <form th:action="@{/publico/encuesta/guardar}" method="post">
            <input type="hidden" name="idCita" th:value="${cita.idCita}">
            
            <p class="mb-2 fw-semibold">¿Cómo calificarías la atención recibida hoy?</p>
            <div class="star-rating">
                <input type="radio" id="star5" name="puntuacion" value="5" required>
                <label for="star5" class="bi bi-star-fill" title="Excelente"></label>
                <input type="radio" id="star4" name="puntuacion" value="4">
                <label for="star4" class="bi bi-star-fill" title="Buena"></label>
                <input type="radio" id="star3" name="puntuacion" value="3">
                <label for="star3" class="bi bi-star-fill" title="Regular"></label>
                <input type="radio" id="star2" name="puntuacion" value="2">
                <label for="star2" class="bi bi-star-fill" title="Mala"></label>
                <input type="radio" id="star1" name="puntuacion" value="1">
                <label for="star1" class="bi bi-star-fill" title="Pésima"></label>
            </div>

            <div class="mb-4 text-start">
                <label for="comentario" class="form-label fw-semibold">Cuéntanos más (comentarios u observaciones):</label>
                <textarea class="form-control" id="comentario" name="comentario" rows="4" 
                          placeholder="Tu comentario ayuda a mejorar la atención de la clínica..." style="border-radius:12px;"></textarea>
            </div>

            <button type="submit" class="btn btn-submit">Enviar Encuesta</button>
        </form>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
