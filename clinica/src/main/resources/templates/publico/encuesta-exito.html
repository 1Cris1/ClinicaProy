<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Enviada - ¡Gracias! - ClinicX</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .success-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            border: 1px solid #e2e8f0;
        }
        .success-icon {
            font-size: 3.5rem;
            color: #10b981;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="success-card text-center">
        <div class="success-icon mb-3 animate__animated animate__bounceIn">
            <i class="bi bi-patch-check-fill"></i>
        </div>
        <h4 class="fw-bold mb-3">¡Encuesta Enviada!</h4>
        <p class="text-muted">Tu respuesta se ha registrado correctamente. Valoramos mucho tu opinión para seguir mejorando día a día.</p>
        <hr class="my-4 text-muted">
        <p class="text-secondary small">¡Que tengas un excelente día!</p>
    </div>
</div>

</body>
</html>
