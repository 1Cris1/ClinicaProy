<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Satisfacción - Error - ClinicX</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }
        .error-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            margin: 100px auto;
            padding: 40px;
            border: 1px solid #e2e8f0;
        }
        .error-icon {
            font-size: 3.5rem;
            color: #ef4444;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="error-card text-center">
        <div class="error-icon mb-3">
            <i class="bi bi-exclamation-octagon-fill"></i>
        </div>
        <h4 class="fw-bold mb-3">No se puede acceder</h4>
        <p class="text-muted" th:text="${error}">Ha ocurrido un error al cargar la encuesta.</p>
        <hr class="my-4 text-muted">
        <p class="text-secondary small">Si crees que esto es un error, por favor contacta con soporte de la clínica.</p>
    </div>
</div>

</body>
</html>
