<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - ClinicX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/recepcionista.css}">
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="app-sidebar rc-sidebar shadow-lg" id="sidebar">
        <div class="app-sidebar-brand">
            <div class="brand-icon">C</div>
            <div>
                <div class="brand-text">ClinicX</div>
                <div class="brand-sub" style="font-size: .6rem; color: #94A3B8; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Reception Desk</div>
            </div>
        </div>

        <div class="app-sidebar-user">
            <div class="avatar" th:text="${recepcionistaGlobal != null && recepcionistaGlobal.nombres != null && recepcionistaGlobal.apellidos != null ? #strings.substring(recepcionistaGlobal.nombres, 0, 1) + #strings.substring(recepcionistaGlobal.apellidos, 0, 1) : 'RC'}">RC</div>
            <div>
                <p class="user-name" th:text="${recepcionistaGlobal != null ? recepcionistaGlobal.nombres : 'Recepcionista'}">Recepcionista</p>
                <p class="user-role">Atención Premium</p>
            </div>
        </div>

        <div class="app-sidebar-nav px-3">
            <div class="app-sidebar-label" style="color: #475569; font-size: 0.65rem; margin-bottom: 0.5rem;">Panel Principal</div>
            <a th:href="@{/recepcionista/inicio}" th:class="${#strings.contains(view, 'dashboard')} ? 'app-nav-link active' : 'app-nav-link'" data-page="inicio">
                <i class="bi bi-grid-fill"></i> Vista General
            </a>

            <div class="app-sidebar-label mt-4" style="color: #475569; font-size: 0.65rem; margin-bottom: 0.5rem;">Operaciones</div>
            <a th:href="@{/recepcionista/citas}" th:class="${#strings.contains(view, 'citas')} ? 'app-nav-link active' : 'app-nav-link'" data-page="citas">
                <i class="bi bi-calendar-event-fill"></i> Agenda Hoy
                <span class="badge rounded-pill bg-danger ms-auto animate-pulse" style="font-size: 0.6rem; padding: 0.35em 0.65em;" th:if="${citasHoyGlobalCount != null and citasHoyGlobalCount > 0}" th:text="${citasHoyGlobalCount}">5</span>
            </a>
            <a th:href="@{/recepcionista/pacientes}" th:class="${#strings.contains(view, 'pacientes')} ? 'app-nav-link active' : 'app-nav-link'" data-page="pacientes">
                <i class="bi bi-people-fill"></i> Directorio Pacientes
            </a>
            <a th:href="@{/recepcionista/medicos}" th:class="${#strings.contains(view, 'medicos')} ? 'app-nav-link active' : 'app-nav-link'" data-page="medicos">
                <i class="bi bi-person-badge-fill"></i> Cuerpo Médico
            </a>
            <a th:href="@{/recepcionista/pagos}" th:class="${#strings.contains(view, 'pagos')} ? 'app-nav-link active' : 'app-nav-link'" data-page="pagos">
                <i class="bi bi-credit-card-2-front-fill"></i> Facturación
            </a>

            <div class="app-sidebar-label mt-4" style="color: #475569; font-size: 0.65rem; margin-bottom: 0.5rem;">Configuración</div>
            <a th:href="@{/recepcionista/perfil}" th:class="${#strings.contains(view, 'perfil')} ? 'app-nav-link active' : 'app-nav-link'" data-page="perfil">
                <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
        </div>

        <div class="app-sidebar-footer mt-auto p-3">
            <a th:href="@{/}" class="app-nav-link sidebar-logout rounded-3">
                <i class="bi bi-power"></i> <span class="fw-bold">Cerrar Sesión</span>
            </a>
        </div>
    </aside>

    <div class="app-main">
        <header class="app-topbar px-4">
            <div class="d-flex align-items-center gap-3">
                <button class="sidebar-toggle shadow-sm" id="sidebarToggle" style="background: #fff; border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-list text-dark" style="font-size: 1.2rem;"></i>
                </button>
                <div class="d-flex flex-column">
                    <h1 class="page-title mb-0 fw-800" style="font-size: 1.25rem; color: #1E293B; letter-spacing: -0.5px;" th:text="${pageTitle}">Panel</h1>
                    <div class="d-flex align-items-center gap-2" style="margin-top: -2px;">
                        <span class="status-dot-pulse bg-success" style="width: 6px; height: 6px;"></span>
                        <span class="text-muted fw-500" style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px;">Sistema en línea</span>
                    </div>
                </div>
            </div>
            
            <div class="d-flex align-items-center gap-3">
                <!-- Perfil en Topbar con diseño Premium -->
                <div class="d-flex align-items-center gap-2 d-none d-md-flex p-1 pe-3 rounded-pill bg-white shadow-sm border" style="cursor: pointer;">
                    <div class="shadow-sm" style="width:36px;height:36px;background:var(--gradient-primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:0.75rem;">
                        <span th:text="${recepcionistaGlobal != null && recepcionistaGlobal.nombres != null && recepcionistaGlobal.apellidos != null ? #strings.substring(recepcionistaGlobal.nombres, 0, 1) + #strings.substring(recepcionistaGlobal.apellidos, 0, 1) : 'RC'}">RC</span>
                    </div>
                    <div class="d-flex flex-column">
                        <p class="mb-0 fw-800" style="font-size:.75rem; color: #1E293B; line-height: 1.2;" th:text="${recepcionistaGlobal.nombres}">Recepción</p>
                        <p class="mb-0 fw-500" style="font-size:.6rem; color: var(--primary);" th:text="${recepcionistaGlobal.email}">En línea</p>
                    </div>
                </div>

                <div class="btn-icon bg-white border shadow-sm rounded-3 d-flex align-items-center justify-content-center" style="width: 42px; height: 42px; color: #64748B; cursor: pointer; transition: all 0.2s ease;" id="notifBtn" title="Notificaciones">
                    <i class="bi bi-bell-fill" style="font-size: 1.1rem;"></i>
                </div>
            </div>
        </header>

        <div class="app-content">
            <div th:replace="~{ ${view} :: cuerpo }"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/vue.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <th:block th:if="${view != null}">
        <div th:replace="~{ ${view} :: scripts } ?: ~{}"></div>
    </th:block>
</body>
</html>
