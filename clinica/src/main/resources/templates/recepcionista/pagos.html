<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><title>Pagos - Recepción - ClinicX</title></head>
<body>
    <div th:fragment="cuerpo">
        

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h4 class="fw-800 mb-0" style="color: var(--sidebar-bg); letter-spacing: -0.5px;">Pagos y Facturación</h4>
            <button class="btn btn-primary d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#modalNuevoPago">
                <i class="bi bi-plus-circle-fill"></i> Registrar Pago
            </button>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-6 col-lg-3">
                <div class="app-stat shadow-sm border-0" style="border-left: 4px solid #059669 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon shadow-sm" style="background:#D1FAE5;color:#059669;"><i class="bi bi-cash-stack"></i></div>
                        <div>
                            <p class="mb-0 text-muted fw-bold text-uppercase" style="font-size:.65rem; letter-spacing:1px;">Recaudado</p>
                            <h4 class="fw-800 mb-0" style="font-size:1.6rem; color: #1E293B;" th:text="'S/ ' + ${#numbers.formatDecimal(totalRecaudado, 1, 2)}">S/ 0.00</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="app-stat shadow-sm border-0" style="border-left: 4px solid #2563EB !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon shadow-sm" style="background:#DBEAFE;color:#2563EB;"><i class="bi bi-receipt"></i></div>
                        <div>
                            <p class="mb-0 text-muted fw-bold text-uppercase" style="font-size:.65rem; letter-spacing:1px;">Transacciones</p>
                            <h4 class="fw-800 mb-0" style="font-size:1.6rem; color: #1E293B;" th:text="${totalTransacciones}">0</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="app-stat shadow-sm border-0" style="border-left: 4px solid #D97706 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon shadow-sm" style="background:#FFFBEB;color:#D97706;"><i class="bi bi-hourglass-split"></i></div>
                        <div>
                            <p class="mb-0 text-muted fw-bold text-uppercase" style="font-size:.65rem; letter-spacing:1px;">Pendientes</p>
                            <h4 class="fw-800 mb-0" style="font-size:1.6rem; color: #1E293B;" th:text="${pagosPendientes}">0</h4>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-6 col-lg-3">
                <div class="app-stat shadow-sm border-0" style="border-left: 4px solid #DC2626 !important;">
                    <div class="d-flex align-items-center gap-3">
                        <div class="stat-icon shadow-sm" style="background:#FEE2E2;color:#DC2626;"><i class="bi bi-credit-card-2-back"></i></div>
                        <div>
                            <p class="mb-0 text-muted fw-bold text-uppercase" style="font-size:.65rem; letter-spacing:1px;">Anulados</p>
                            <h4 class="fw-800 mb-0" style="font-size:1.6rem; color: #1E293B;" th:text="${pagosAnulados}">0</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-card shadow-sm border-0 overflow-hidden">
            <div class="p-3 border-bottom bg-light">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" class="form-control" placeholder="Buscar por paciente o N° comprobante..." id="buscarPago" oninput="searchTable()">
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" id="filtroEstado" onchange="searchTable()">
                            <option value="">Todos los estados</option>
                            <option value="Completado">Completado</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Anulado">Anulado</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="date" class="form-control" id="filtroFecha" onchange="searchTable()">
                    </div>
                </div>
            </div>
            <div class="p-0">
                <table class="app-table align-middle" id="tablaPagos">
                    <thead><tr><th>N° Comprobante</th><th>Fecha</th><th>Paciente</th><th>Servicio</th><th>Método</th><th>Monto</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${pagos.isEmpty()}">
                            <td colspan="8" class="text-center text-muted py-4">No hay pagos registrados.</td>
                        </tr>
                        <tr th:each="p : ${pagos}">
                            <td class="fw-bold" th:text="${p.numeroComprobante}">--</td>
                            <td th:text="${#temporals.format(p.fechaPago, 'dd/MM/yyyy HH:mm')}">--</td>
                            <td th:text="${p.paciente != null} ? ${p.paciente.nombres + ' ' + p.paciente.apellidos} : '-'">--</td>
                            <td th:text="${p.servicio != null} ? ${p.servicio.nombre} : '-'">--</td>
                            <td th:text="${p.metodoPago}">--</td>
                            <td class="fw-bold text-success" th:text="'S/ ' + ${#numbers.formatDecimal(p.monto, 1, 2)}">--</td>
                                <td>
                                    <span th:if="${p.estado == 'Completado'}" class="app-badge badge-success-premium">Completado</span>
                                    <span th:if="${p.estado == 'Pendiente'}" class="app-badge badge-warning-premium">Pendiente</span>
                                    <span th:if="${p.estado == 'Anulado'}" class="app-badge badge-danger-premium">Anulado</span>
                                </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a class="rc-btn-action" th:href="@{/recepcionista/pagos/comprobante/{id}(id=${p.id})}" target="_blank">
                                        <i class="bi bi-printer"></i>
                                    </a>
                                    <button th:if="${p.estado == 'Completado'}" class="rc-btn-action text-danger" th:attr="data-id=${p.id}" onclick="anularPago(this)">
                                        <i class="bi bi-x-circle"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal Nuevo Pago -->
        <div class="modal fade" id="modalNuevoPago" tabindex="-1">
            <div class="modal-dialog modal-lg"><div class="modal-content" style="border-radius:var(--rc-radius);border:none;">
                <div class="modal-header border-0 pb-0"><h5 class="modal-title fw-bold">Registrar Pago</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <!-- EXPOSICIÓN JHOAN: Este formulario agrupa el monto, método y servicio para mandarlo seguro por POST al Backend y registrar la ganancia. -->
                    <form th:action="@{/recepcionista/pagos/nuevo}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Paciente</label>
                                <select name="pacienteId" class="form-select" required>
                                    <option value="">Seleccionar paciente...</option>
                                    <option th:each="p : ${pacientes}" th:value="${p.id}" th:text="${p.nombres + ' ' + p.apellidos + ' - DNI: ' + p.dni}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Servicio</label>
                                <select name="servicioId" class="form-select">
                                    <option value="">Seleccionar servicio...</option>
                                    <option th:each="s : ${servicios}" th:value="${s.id}" th:text="${s.nombre + ' - S/ ' + s.precio}"></option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Monto (S/)</label>
                                <input name="monto" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Método de Pago</label>
                                <select name="metodoPago" class="form-select" required>
                                    <option value="Efectivo">Efectivo</option>
                                    <option value="Tarjeta Débito">Tarjeta Débito</option>
                                    <option value="Tarjeta Crédito">Tarjeta Crédito</option>
                                    <option value="Yape">Yape</option>
                                    <option value="Plin">Plin</option>
                                    <option value="Transferencia">Transferencia</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">Tipo Comprobante</label>
                                <select name="tipoComprobante" class="form-select">
                                    <option value="Boleta">Boleta</option>
                                    <option value="Factura">Factura</option>
                                    <option value="Ticket">Ticket</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label small fw-bold">Observaciones</label>
                                <textarea name="observaciones" class="form-control" rows="2" placeholder="Observaciones del pago"></textarea>
                            </div>
                        </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button class="btn btn-outline-secondary rounded-pill px-3 btn-sm" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn rounded-pill px-4 fw-bold btn-sm" style="background:#8B5CF6;color:#fff;">Registrar Pago</button>
                </div>
                    </form>
            </div></div>
        </div>

        
    </div>
</body>
</html>
